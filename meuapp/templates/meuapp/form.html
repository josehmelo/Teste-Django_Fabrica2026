<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        background-color: #f5f5f5;
        color: #333;
      }

      h1 {
        color: #4a90d9;
        border-bottom: 2px solid #4a90d9;
        padding-bottom: 10px;
      }

      form {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      }

      form p {
        margin-bottom: 14px;
      }

      form input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
      }

      form label {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
        font-weight: bold;
      }

      button {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        background-color: #4a90d9;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background-color: #357abd;
      }
    </style>
  </head>
  <body>

    <h1>Cadastro de Pessoas</h1>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Salvar</button>
    </form>

  </body>
</html>
